<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday</title>

<style>
body{
margin:0;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
}

/* sections */
.section{display:none;text-align:center;}
.active{display:block;}

input{
padding:10px;
border-radius:20px;
border:none;
margin-top:10px;
text-align:center;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff5e78;
color:white;
font-weight:bold;
cursor:pointer;
}

/* cake */
.cake{
width:140px;
height:110px;
background:#ff8fab;
margin:auto;
border-radius:10px;
position:relative;
}

.candle{
position:absolute;
top:-40px;
left:50%;
transform:translateX(-50%);
width:10px;
height:40px;
background:white;
}

.flame{
position:absolute;
top:-15px;
left:50%;
transform:translateX(-50%);
width:15px;
height:15px;
background:orange;
border-radius:50%;
animation:flicker 0.2s infinite alternate;
}

@keyframes flicker{
from{transform:translateX(-50%) scale(1);}
to{transform:translateX(-50%) scale(1.3);}
}

/* fireworks */
canvas{
position:fixed;
top:0;
left:0;
display:none;
}

/* text */
#text{
position:absolute;
top:40%;
width:100%;
text-align:center;
font-size:28px;
color:white;
display:none;
text-shadow:0 0 20px white,0 0 40px pink;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="section active">
<h2>Enter Your Name 💖</h2>
<input id="name" placeholder="Your Name">
<br>
<button onclick="start()">Start ✨</button>
</div>

<!-- CAKE -->
<div id="cake" class="section">
<h2>Make a Wish 🎂</h2>
<div class="cake">
<div class="candle">
<div class="flame" id="flame"></div>
</div>
</div>
<br>
<button onclick="blow()">Blow Candle 🕯️</button>
</div>

<!-- TEXT -->
<div id="text">Happy Birthday Love ❤️</div>

<canvas id="canvas"></canvas>

<script>

/* SWITCH SECTIONS */
function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* LOGIN */
function start(){
let name=document.getElementById("name").value;

if(name.trim()===""){
alert("Enter name first!");
return;
}

show("cake");
}

/* BLOW CANDLE */
function blow(){
document.getElementById("flame").style.display="none";
show(""); // hide cake
startFireworks();
}

/* FIREWORKS */
function startFireworks(){

document.body.style.background="black";

let canvas=document.getElementById("canvas");
canvas.style.display="block";

let ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let rockets=[];
let particles=[];

/* ROCKET */
function launch(){
rockets.push({
x:Math.random()*canvas.width,
y:canvas.height,
vx:(Math.random()-0.5)*2,
vy:-7,
explodeY:Math.random()*canvas.height/2
});
}

/* EXPLOSION */
function explode(x,y){
for(let i=0;i<120;i++){
particles.push({
x:x,
y:y,
angle:Math.random()*2*Math.PI,
speed:Math.random()*5+2,
life:100,
color:`hsl(${Math.random()*360},100%,60%)`
});
}
}

/* ANIMATION */
function animate(){
requestAnimationFrame(animate);

ctx.fillStyle="rgba(0,0,0,0.25)";
ctx.fillRect(0,0,canvas.width,canvas.height);

/* rockets */
rockets.forEach((r,i)=>{
r.x+=r.vx;
r.y+=r.vy;

ctx.fillStyle="white";
ctx.fillRect(r.x,r.y,2,8);

if(r.y<=r.explodeY){
explode(r.x,r.y);
rockets.splice(i,1);
}
});

/* particles */
particles.forEach((p,i)=>{
p.x+=Math.cos(p.angle)*p.speed;
p.y+=Math.sin(p.angle)*p.speed;
p.life--;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle=p.color;
ctx.shadowBlur=10;
ctx.shadowColor=p.color;
ctx.fill();

if(p.life<=0){
particles.splice(i,1);
}
});

/* continuous launch */
if(Math.random()<0.04){
launch();
}
}

animate();

/* SHOW TEXT */
setTimeout(()=>{
document.getElementById("text").style.display="block";
},2000);

}
</script>

</body>
  </html>
